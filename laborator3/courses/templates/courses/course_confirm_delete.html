{% extends "courses/base.html" %}
{% block content %}
<h1>Delete Course</h1>
<p>Are you sure you want to delete the course <strong>"{{ course.title }}"</strong>?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" style="background-color: red; color: white; padding: 5px 10px; border: none; cursor: pointer;">Yes, Confirm Delete</button>
    <a href="{% url 'course_detail' course.pk %}" style="margin-left: 10px;">Cancel</a>
</form>
{% endblock %}
